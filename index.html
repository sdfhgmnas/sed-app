<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Calculator</title>
 
<!--
  ============================================================
  TASR BharatNext — Fuel Manager
  Calculator-disguise diesel entry app
  ============================================================
  SETUP:
  1. Create a Supabase project, run supabase-schema.sql in SQL Editor
  2. Paste your Project URL and anon key in the CONFIG block below
  3. Open this HTML in browser. Default secret: 3578, owner pwd: 1234
  4. Login as owner → change passwords, add vehicles, activate managers
  ============================================================
  Works fully offline; queues writes to localStorage and syncs
  when network returns. Sync status pill shows live state.
-->
 
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
 
<style>
:root{
  --bg:#ffffff; --surface:#f8fafc; --surface-2:#f1f5f9;
  --border:#e2e8f0; --border-dark:#cbd5e1;
  --accent:#06b6d4; --accent-dark:#0891b2; --accent-light:#cffafe;
  --text:#0f172a; --text-muted:#64748b; --text-soft:#94a3b8;
  --success:#10b981; --warn:#f59e0b; --danger:#ef4444;
  --radius:10px; --radius-sm:6px;
  --shadow:0 1px 2px rgba(15,23,42,.04), 0 4px 12px rgba(15,23,42,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;
  background:var(--surface);color:var(--text);font-size:14px;line-height:1.4;
  -webkit-tap-highlight-color:transparent;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px;color:inherit}
 
/* ==================== CALCULATOR (Apple-style fullscreen) ==================== */
html{background:#000}
#calc-screen{
  min-height:100vh; min-height:100dvh;
  background:#000;
  flex-direction:column; justify-content:flex-end;
  padding:20px 14px max(20px, env(safe-area-inset-bottom)) 14px;
  max-width:430px; margin:0 auto;
}
#calc-screen.active{ display:flex; }
.calc{ width:100%; background:transparent; padding:0; border-radius:0; box-shadow:none; }
.calc-display{
  background:transparent; padding:30px 14px 20px; margin-bottom:8px;
  text-align:right; color:#fff; min-height:140px;
  display:flex; flex-direction:column; justify-content:flex-end;
  overflow:hidden; word-break:break-all;
}
.calc-history{ font-size:20px; color:#666; min-height:24px; font-weight:300; margin-bottom:4px; }
.calc-current{ font-size:80px; color:#fff; font-weight:200; line-height:1; letter-spacing:-2px; }
.calc-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
.calc-btn{
  aspect-ratio:1/1; border-radius:999px;
  font-size:32px; font-weight:400;
  background:#333; color:#fff;
  display:flex; align-items:center; justify-content:center;
  transition:filter .1s, transform .05s; user-select:none;
}
.calc-btn:active{ filter:brightness(1.5); transform:scale(.97); }
.calc-btn.op{ background:#ff9500; color:#fff; font-size:38px; }
.calc-btn.op:active{ filter:brightness(1.2); }
.calc-btn.eq{ background:#ff9500; color:#fff; font-size:38px; }
.calc-btn.eq:active{ filter:brightness(1.2); }
.calc-btn.clr{ background:#a5a5a5; color:#000; font-size:28px; }
.calc-btn.clr:active{ filter:brightness(1.1); }
.calc-btn.zero{
  grid-column:span 2; aspect-ratio:auto; border-radius:999px;
  text-align:left; justify-content:flex-start; padding-left:32px;
}
@media(max-width:430px){
  .calc-current{font-size:68px}
  .calc-display{min-height:120px;padding:20px 10px 14px}
  .calc-grid{gap:10px}
  .calc-btn{font-size:30px}
  .calc-btn.op,.calc-btn.eq{font-size:34px}
  .calc-btn.zero{padding-left:28px}
}
@media(max-width:340px){
  .calc-current{font-size:56px}
  .calc-btn{font-size:26px}
}
/* Ensure dashboard has its own bg over the black html */
#dash-screen{background:var(--surface)}
 
/* ==================== APP SHELL ==================== */
.screen{display:none;min-height:100vh}
.screen.active{display:block}
.topbar{
  background:#fff;border-bottom:1px solid var(--border);padding:10px 14px;
  display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;
}
.brand{font-weight:700;font-size:15px;color:var(--text);letter-spacing:-.2px}
.brand .accent{color:var(--accent-dark)}
.topbar-spacer{flex:1}
.who{font-size:12px;color:var(--text-muted);display:flex;flex-direction:column;align-items:flex-end;line-height:1.2}
.who b{color:var(--text);font-size:13px}
 
.sync-pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 8px;border-radius:999px;font-size:11px;font-weight:600;
}
.sync-pill .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.sync-online{background:#dcfce7;color:#15803d}
.sync-offline{background:#fee2e2;color:#b91c1c}
.sync-syncing{background:#fef3c7;color:#a16207}
.sync-pending{background:#e0e7ff;color:#3730a3}
 
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:8px 14px;border-radius:var(--radius-sm);font-weight:600;font-size:13px;
  background:var(--accent);color:#fff;transition:background .15s,transform .05s;
  border:1px solid transparent;
}
.btn:hover{background:var(--accent-dark)}
.btn:active{transform:scale(.97)}
.btn.ghost{background:#fff;color:var(--text);border-color:var(--border-dark)}
.btn.ghost:hover{background:var(--surface-2)}
.btn.danger{background:var(--danger)}
.btn.danger:hover{background:#dc2626}
.btn.success{background:var(--success)}
.btn.small{padding:5px 10px;font-size:12px}
.btn.icon{padding:6px 8px}
.btn:disabled{opacity:.5;cursor:not-allowed}
 
/* ==================== LOGIN ==================== */
#login-screen{display:none;align-items:center;justify-content:center;padding:24px;
  background:linear-gradient(180deg,#ecfeff 0%,#f8fafc 100%);}
#login-screen.active{display:flex}
.login-card{
  background:#fff;border-radius:16px;padding:28px 24px;width:100%;max-width:380px;
  box-shadow:var(--shadow);border:1px solid var(--border);
}
.login-title{font-size:20px;font-weight:700;margin-bottom:4px;letter-spacing:-.3px}
.login-sub{color:var(--text-muted);font-size:13px;margin-bottom:20px}
.role-tabs{display:flex;gap:6px;background:var(--surface-2);padding:4px;border-radius:8px;margin-bottom:18px}
.role-tab{flex:1;padding:8px 10px;font-weight:600;font-size:13px;color:var(--text-muted);border-radius:6px}
.role-tab.active{background:#fff;color:var(--accent-dark);box-shadow:0 1px 2px rgba(0,0,0,.05)}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:4px;letter-spacing:.3px;text-transform:uppercase}
.form-row input,.form-row select,.form-row textarea{
  width:100%;padding:10px 12px;border:1px solid var(--border-dark);
  border-radius:var(--radius-sm);background:#fff;color:var(--text);outline:none;
  transition:border-color .15s,box-shadow .15s;
}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{
  border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light);
}
.form-row .hint{font-size:11px;color:var(--text-soft);margin-top:3px}
.msg{padding:8px 12px;border-radius:6px;font-size:12px;margin-bottom:12px}
.msg.err{background:#fee2e2;color:#991b1b}
.msg.ok{background:#dcfce7;color:#166534}
 
/* ==================== DASHBOARD ==================== */
.tabbar{
  background:#fff;border-bottom:1px solid var(--border);
  display:flex;overflow-x:auto;scrollbar-width:none;
}
.tabbar::-webkit-scrollbar{display:none}
.tab{
  padding:11px 14px;font-size:13px;font-weight:600;color:var(--text-muted);
  border-bottom:2px solid transparent;white-space:nowrap;
}
.tab.active{color:var(--accent-dark);border-bottom-color:var(--accent)}
 
.page{padding:14px;display:none;max-width:1100px;margin:0 auto}
.page.active{display:block}
 
.section{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
.section-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px;flex-wrap:wrap}
.section-h h3{font-size:14px;font-weight:700;letter-spacing:-.2px}
.section-h .sub{font-size:11px;color:var(--text-muted);font-weight:500}
 
.grid{display:grid;gap:10px}
.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
@media(max-width:600px){.grid-3{grid-template-columns:1fr 1fr}.grid-2{grid-template-columns:1fr}}
 
table{width:100%;border-collapse:collapse;font-size:13px}
table th{text-align:left;padding:8px 10px;background:var(--surface-2);font-weight:600;color:var(--text-muted);font-size:11px;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--border)}
table td{padding:8px 10px;border-bottom:1px solid var(--surface-2);vertical-align:top}
table tbody tr:hover{background:var(--surface)}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
 
.kpi{background:linear-gradient(135deg,#ecfeff 0%,#cffafe 100%);border:1px solid #a5f3fc;border-radius:var(--radius);padding:12px}
.kpi .lbl{font-size:11px;color:var(--accent-dark);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.kpi .val{font-size:22px;font-weight:700;color:var(--text);margin-top:2px}
.kpi .sub{font-size:11px;color:var(--text-muted);margin-top:2px}
 
.empty{text-align:center;padding:30px 20px;color:var(--text-muted);font-size:13px}
.empty .em{font-size:30px;margin-bottom:6px}
 
.badge{display:inline-block;padding:2px 7px;border-radius:999px;font-size:11px;font-weight:600}
.badge.ok{background:#dcfce7;color:#166534}
.badge.off{background:#fee2e2;color:#991b1b}
.badge.warn{background:#fef3c7;color:#92400e}
.badge.info{background:#dbeafe;color:#1e40af}
 
.row-actions{display:flex;gap:6px;flex-wrap:wrap}
.icon-btn{
  width:28px;height:28px;border-radius:6px;display:inline-flex;align-items:center;
  justify-content:center;font-size:14px;background:var(--surface-2);color:var(--text-muted);
}
.icon-btn:hover{background:var(--surface)}
.icon-btn.danger{color:var(--danger)}
.icon-btn.danger:hover{background:#fee2e2}
 
/* Modal */
.modal-bg{
  position:fixed;inset:0;background:rgba(15,23,42,.55);
  display:none;align-items:center;justify-content:center;padding:16px;z-index:200;
}
.modal-bg.active{display:flex}
.modal{
  background:#fff;border-radius:14px;max-width:520px;width:100%;
  max-height:90vh;overflow-y:auto;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.3);
}
.modal-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.modal-h h3{font-size:16px;font-weight:700}
.modal-x{font-size:22px;color:var(--text-muted);width:30px;height:30px;border-radius:6px}
.modal-x:hover{background:var(--surface-2)}
 
/* Toast */
.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#0f172a;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;
  font-weight:500;opacity:0;transition:all .25s;z-index:300;pointer-events:none;
  max-width:90vw;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--danger)}
.toast.ok{background:var(--success)}
 
/* Entry form specifics */
.source-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.source-pill{
  flex:1;min-width:80px;padding:9px 10px;border:1px solid var(--border-dark);
  border-radius:var(--radius-sm);background:#fff;font-weight:600;font-size:12px;
  color:var(--text-muted);text-align:center;transition:all .15s;
}
.source-pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}
 
.entry-meta{display:flex;gap:10px;font-size:11px;color:var(--text-muted);flex-wrap:wrap;margin-top:4px}
.entry-meta b{color:var(--text)}
 
.cf-row{display:flex;gap:8px;align-items:center;padding:8px;background:var(--surface);border-radius:6px;margin-bottom:6px}
.cf-row input,.cf-row select{padding:5px 8px;border:1px solid var(--border-dark);border-radius:4px;font-size:12px;background:#fff}
.cf-row input[type="checkbox"]{width:auto}
 
.diff-block{background:var(--surface);border-left:3px solid var(--warn);padding:8px 10px;border-radius:4px;margin-top:6px;font-size:12px}
.diff-block .old{color:var(--danger);text-decoration:line-through}
.diff-block .new{color:var(--success);font-weight:600}
 
@media(max-width:520px){
  .topbar{padding:8px 12px}
  .brand{font-size:13px}
  .who{font-size:11px}
  .page{padding:10px}
  .section{padding:12px}
  .kpi .val{font-size:18px}
}
</style>
</head>
<body>
 
<!-- ==================== CALCULATOR SCREEN ==================== -->
<div id="calc-screen" class="screen active">
  <div class="calc">
    <div class="calc-display">
      <div class="calc-history" id="calc-history">&nbsp;</div>
      <div class="calc-current" id="calc-current">0</div>
    </div>
    <div class="calc-grid">
      <button class="calc-btn clr" data-k="C">AC</button>
      <button class="calc-btn clr" data-k="±">+/−</button>
      <button class="calc-btn clr" data-k="%">%</button>
      <button class="calc-btn op" data-k="÷">÷</button>
      <button class="calc-btn" data-k="7">7</button>
      <button class="calc-btn" data-k="8">8</button>
      <button class="calc-btn" data-k="9">9</button>
      <button class="calc-btn op" data-k="×">×</button>
      <button class="calc-btn" data-k="4">4</button>
      <button class="calc-btn" data-k="5">5</button>
      <button class="calc-btn" data-k="6">6</button>
      <button class="calc-btn op" data-k="-">−</button>
      <button class="calc-btn" data-k="1">1</button>
      <button class="calc-btn" data-k="2">2</button>
      <button class="calc-btn" data-k="3">3</button>
      <button class="calc-btn op" data-k="+">+</button>
      <button class="calc-btn zero" data-k="0">0</button>
      <button class="calc-btn" data-k=".">.</button>
      <button class="calc-btn eq" data-k="=">=</button>
    </div>
  </div>
</div>
 
<!-- ==================== LOGIN SCREEN ==================== -->
<div id="login-screen" class="screen">
  <div class="login-card">
    <div class="login-title">TASR <span style="color:var(--accent-dark)">BharatNext</span></div>
    <div class="login-sub">Fuel Manager · Secure Login</div>
 
    <div class="role-tabs">
      <button class="role-tab active" data-role="manager">Diesel Manager</button>
      <button class="role-tab" data-role="owner">Owner</button>
    </div>
 
    <div id="login-msg"></div>
 
    <div id="login-manager">
      <div class="form-row">
        <label>Select your name</label>
        <select id="login-mgr-select"><option value="">— select —</option></select>
      </div>
      <div class="form-row">
        <label>Password</label>
        <input type="password" id="login-mgr-pass" placeholder="Enter password" autocomplete="off">
      </div>
    </div>
 
    <div id="login-owner" style="display:none">
      <div class="form-row">
        <label>Owner password</label>
        <input type="password" id="login-owner-pass" placeholder="Enter owner password" autocomplete="off">
      </div>
    </div>
 
    <button class="btn" id="login-btn" style="width:100%;padding:11px">Login</button>
    <button class="btn ghost" id="login-back" style="width:100%;margin-top:8px">← Back to calculator</button>
  </div>
</div>
 
<!-- ==================== DASHBOARD SCREEN ==================== -->
<div id="dash-screen" class="screen">
  <div class="topbar">
    <div class="brand">TASR <span class="accent">BharatNext</span></div>
    <span id="sync-pill" class="sync-pill sync-online"><span class="dot"></span><span id="sync-text">Online</span></span>
    <div class="topbar-spacer"></div>
    <div class="who"><b id="who-name">—</b><span id="who-role">—</span></div>
    <button class="btn ghost small" id="logout-btn">Logout</button>
  </div>
 
  <div class="tabbar" id="tabbar"></div>
  <div id="pages"></div>
</div>
 
<!-- Modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-h">
      <h3 id="modal-title">Title</h3>
      <button class="modal-x" onclick="closeModal()">×</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>
 
<div class="toast" id="toast"></div>
 
<script>
'use strict';
 
// ============================================================
// CONFIG — paste your Supabase credentials here
// ============================================================
const SUPABASE_URL  = 'https://ouqvyljakhiridaavzdu.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91cXZ5bGpha2hpcmlkYWF2emR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMjcyMzEsImV4cCI6MjA5NDkwMzIzMX0.zo50bE_QAX0xOadcMNo_m1zy5cqqprYkwLOeTmKo8Hg';
const DEFAULT_SECRET = '3578';
const DEFAULT_OWNER_PWD = '1234';
const DEVICE_ID = (() => {
  let d = localStorage.getItem('tasr_device_id');
  if(!d){ d = 'dev_'+Math.random().toString(36).slice(2,10); localStorage.setItem('tasr_device_id',d); }
  return d;
})();
 
// ============================================================
// SUPABASE INIT
// ============================================================
let sb = null;
if(SUPABASE_URL && SUPABASE_ANON){
  try{ sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON); }
  catch(e){ console.warn('Supabase init failed', e); }
}
 
// ============================================================
// STATE
// ============================================================
const state = {
  user: null,              // {role:'owner'|'manager', id?, name?}
  vehicles: [],
  managers: [],
  customFields: [],
  entries: [],
  settings: {
    owner_password: DEFAULT_OWNER_PWD,
    secret_code: DEFAULT_SECRET,
    calculator_enabled: 'true',
  },
  pendingOps: [],          // offline queue
  online: navigator.onLine,
  syncing: false,
  activeTab: 'overview',
};
 
const LS_KEY = 'tasr_fuel_state_v1';
 
function persist(){
  localStorage.setItem(LS_KEY, JSON.stringify({
    vehicles:state.vehicles, managers:state.managers,
    customFields:state.customFields, entries:state.entries,
    settings:state.settings, pendingOps:state.pendingOps,
  }));
}
function loadPersisted(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return;
    const d = JSON.parse(raw);
    Object.assign(state, {
      vehicles:d.vehicles||[], managers:d.managers||[],
      customFields:d.customFields||[], entries:d.entries||[],
      settings: Object.assign({}, state.settings, d.settings||{}),
      pendingOps: d.pendingOps||[],
    });
  }catch(e){ console.warn('load failed', e); }
}
 
// ============================================================
// UTILITIES
// ============================================================
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const uuid = () => 'id_' + Date.now().toString(36) + Math.random().toString(36).slice(2,8);
const fmtDT = ts => {
  if(!ts) return '—';
  const d = new Date(ts);
  if(isNaN(d)) return '—';
  return d.toLocaleString('en-IN',{day:'2-digit',month:'short',year:'2-digit',hour:'2-digit',minute:'2-digit',hour12:true});
};
const fmtD = ts => {
  if(!ts) return '—';
  const d = new Date(ts); if(isNaN(d)) return '—';
  return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'2-digit'});
};
const escapeHtml = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
 
function toast(msg, type=''){
  const t = $('#toast'); t.textContent = msg; t.className = 'toast show ' + type;
  setTimeout(()=>{ t.className='toast'; }, 2500);
}
 
function openModal(title, html){
  $('#modal-title').textContent = title;
  $('#modal-body').innerHTML = html;
  $('#modal').classList.add('active');
}
function closeModal(){ $('#modal').classList.remove('active'); }
window.closeModal = closeModal;
 
// ============================================================
// 10 manager slots — ensure local array always has 10 entries
// ============================================================
function ensureManagerSlots(){
  for(let i=1;i<=10;i++){
    if(!state.managers.find(m=>m.id===i)){
      state.managers.push({id:i, name:'Manager '+i, password:'1234', active:false, updated_at:new Date().toISOString()});
    }
  }
  state.managers.sort((a,b)=>a.id-b.id);
}
 
// ============================================================
// CALCULATOR
// ============================================================
const calcState = { expr:'', history:'', secret:'' };
 
function calcRender(){
  $('#calc-current').textContent = calcState.expr || '0';
  $('#calc-history').innerHTML = calcState.history || '&nbsp;';
}
 
function calcPress(k){
  // track secret unlock — any digit pressed appends; non-digit clears
  if(/^[0-9]$/.test(k)){
    calcState.secret = (calcState.secret + k).slice(-8);
    const code = state.settings.secret_code || DEFAULT_SECRET;
    if(calcState.secret.endsWith(code)){
      calcState.secret = '';
      // Honor calculator-enabled toggle by allowing unlock always for owner;
      // managers will fail to login if there are no active managers, but
      // the secret-code transition itself stays available.
      gotoLogin();
      return;
    }
  } else {
    calcState.secret = '';
  }
 
  if(k==='C'){ calcState.expr=''; calcState.history=''; calcRender(); return; }
  if(k==='='){
    try{
      const expr = calcState.expr.replace(/×/g,'*').replace(/÷/g,'/').replace(/%/g,'/100');
      if(!expr){ return; }
      // safe eval: only allow digits and basic ops
      if(!/^[\d+\-*/.() ]+$/.test(expr)){ calcState.expr='Err'; calcRender(); return; }
      // eslint-disable-next-line no-new-func
      const r = Function('"use strict";return ('+expr+')')();
      calcState.history = calcState.expr + ' =';
      calcState.expr = String(Number.isFinite(r) ? +r.toFixed(8) : 'Err');
      calcRender();
    }catch(e){ calcState.expr='Err'; calcRender(); }
    return;
  }
  if(k==='±'){
    if(calcState.expr.startsWith('-')) calcState.expr = calcState.expr.slice(1);
    else if(calcState.expr) calcState.expr = '-' + calcState.expr;
    calcRender(); return;
  }
  // append
  calcState.expr += k;
  calcRender();
}
 
$('#calc-screen').addEventListener('click', e=>{
  const b = e.target.closest('[data-k]');
  if(b) calcPress(b.dataset.k);
});
 
// keyboard support
document.addEventListener('keydown', e=>{
  if(!$('#calc-screen').classList.contains('active')) return;
  if(/^[0-9.]$/.test(e.key)) calcPress(e.key);
  else if(e.key==='+'||e.key==='-') calcPress(e.key);
  else if(e.key==='*') calcPress('×');
  else if(e.key==='/') { e.preventDefault(); calcPress('÷'); }
  else if(e.key==='Enter'||e.key==='=') calcPress('=');
  else if(e.key==='Backspace') { calcState.expr = calcState.expr.slice(0,-1); calcRender(); }
  else if(e.key==='Escape') calcPress('C');
});

// SYNC LAYER
// ============================================================
function updateSyncPill(){
  const p = $('#sync-pill'), t = $('#sync-text');
  if(!sb){
    p.className = 'sync-pill sync-pending';
    t.textContent = 'Local only';
    return;
  }
  if(state.syncing){ p.className='sync-pill sync-syncing'; t.textContent='Syncing…'; return; }
  if(!state.online){ p.className='sync-pill sync-offline'; t.textContent='Offline'; return; }
  if(state.pendingOps.length>0){ p.className='sync-pill sync-pending'; t.textContent='Pending '+state.pendingOps.length; return; }
  p.className = 'sync-pill sync-online'; t.textContent = 'Online · Synced';
}
 
window.addEventListener('online', ()=>{ state.online = true; updateSyncPill(); trySync(); });
window.addEventListener('offline',()=>{ state.online = false; updateSyncPill(); });
 
async function pullAll(){
  if(!sb) return;
  try{
    state.syncing = true; updateSyncPill();
    const [veh, mgr, cf, ent, st] = await Promise.all([
      sb.from('vehicles').select('*').order('name'),
      sb.from('managers').select('*').order('id'),
      sb.from('custom_fields').select('*').order('sort_order'),
      sb.from('entries').select('*').order('fill_time',{ascending:false}).limit(2000),
      sb.from('settings').select('*'),
    ]);
    if(!veh.error) state.vehicles = veh.data||[];
    if(!mgr.error){
      // merge remote managers with local slots
      const remote = mgr.data||[];
      state.managers = [];
      for(let i=1;i<=10;i++){
        const r = remote.find(m=>m.id===i);
        state.managers.push(r || {id:i, name:'Manager '+i, password:'1234', active:false, updated_at:new Date().toISOString()});
      }
    }
    if(!cf.error)  state.customFields = cf.data||[];
    if(!ent.error) state.entries = ent.data||[];
    if(!st.error && st.data){
      st.data.forEach(r => { state.settings[r.key] = r.value; });
    }
    persist();
  }catch(e){ console.warn('pull error', e); }
  finally{ state.syncing=false; updateSyncPill(); }
}
 
function queueOp(op){
  state.pendingOps.push({...op, ts:Date.now(), id:uuid()});
  persist(); updateSyncPill();
  if(state.online && sb) trySync();
}
 
async function trySync(){
  if(!sb || !state.online || state.syncing || state.pendingOps.length===0) return;
  state.syncing = true; updateSyncPill();
  const ops = [...state.pendingOps];
  for(const op of ops){
    try{
      const { table, action, data, match } = op;
      let res;
      if(action==='upsert') res = await sb.from(table).upsert(data);
      else if(action==='insert') res = await sb.from(table).insert(data);
      else if(action==='update') res = await sb.from(table).update(data).match(match);
      else if(action==='delete') res = await sb.from(table).delete().match(match);
      if(res && res.error){ console.warn('sync error', op, res.error); break; }
      state.pendingOps = state.pendingOps.filter(p=>p.id!==op.id);
      persist();
    }catch(e){ console.warn('sync exception', e); break; }
  }
  state.syncing = false;
  updateSyncPill();
  // pull fresh data after push completes
  if(state.pendingOps.length===0) await pullAll();
  renderDash();
}

// ============================================================
 
// VEHICLES
function addVehicle(v){
  v.id = v.id || uuid();
  state.vehicles.push(v);
  persist();
  queueOp({table:'vehicles', action:'upsert', data:v});
}
function updateVehicle(id, patch){
  const i = state.vehicles.findIndex(x=>x.id===id);
  if(i<0) return;
  state.vehicles[i] = {...state.vehicles[i], ...patch};
  persist();
  queueOp({table:'vehicles', action:'update', data:patch, match:{id}});
}
function deleteVehicle(id){
  state.vehicles = state.vehicles.filter(x=>x.id!==id);
  persist();
  queueOp({table:'vehicles', action:'delete', match:{id}});
}
 
// MANAGERS
function updateManager(id, patch){
  const i = state.managers.findIndex(m=>m.id===id);
  if(i<0) return;
  state.managers[i] = {...state.managers[i], ...patch, updated_at:new Date().toISOString()};
  persist();
  queueOp({table:'managers', action:'upsert', data:state.managers[i]});
}
 
// CUSTOM FIELDS
function addCustomField(f){
  f.id = f.id || uuid();
  f.field_key = f.field_key || ('cf_'+Date.now().toString(36));
  state.customFields.push(f);
  persist();
  queueOp({table:'custom_fields', action:'upsert', data:f});
}
function updateCustomField(id, patch){
  const i = state.customFields.findIndex(x=>x.id===id);
  if(i<0) return;
  state.customFields[i] = {...state.customFields[i], ...patch};
  persist();
  queueOp({table:'custom_fields', action:'update', data:patch, match:{id}});
}
function deleteCustomField(id){
  state.customFields = state.customFields.filter(x=>x.id!==id);
  persist();
  queueOp({table:'custom_fields', action:'delete', match:{id}});
}
 
// ENTRIES
function addEntry(e){
  e.id = e.id || uuid();
  e.created_at = e.created_at || new Date().toISOString();
  e.edit_count = 0;
  e.edit_history = [];
  e.device_id = DEVICE_ID;
  state.entries.unshift(e);
  persist();
  queueOp({table:'entries', action:'upsert', data:e});
}
function updateEntry(id, patch, editor){
  const i = state.entries.findIndex(x=>x.id===id);
  if(i<0) return;
  const prev = state.entries[i];
  const diff = {};
  Object.keys(patch).forEach(k=>{
    if(JSON.stringify(prev[k]) !== JSON.stringify(patch[k])){
      diff[k] = {old: prev[k], new: patch[k]};
    }
  });
  const history = Array.isArray(prev.edit_history) ? [...prev.edit_history] : [];
  if(Object.keys(diff).length){
    history.push({at:new Date().toISOString(), by:editor||(state.user?state.user.name:'unknown'), diff});
  }
  const next = {...prev, ...patch, edited_at:new Date().toISOString(), edit_count:(prev.edit_count||0)+1, edit_history:history};
  state.entries[i] = next;
  persist();
  queueOp({table:'entries', action:'upsert', data:next});
}
 
// SETTINGS
function updateSetting(key, value){
  state.settings[key] = String(value);
  persist();
  queueOp({table:'settings', action:'upsert', data:{key, value:String(value)}});
}

      ${canEdit?`<td><button class="btn small ghost" onclick="editEntryModal('${e.id}')">Edit</button></td>`:''}

  return `<div class="table-wrap"><table>

  </table></div>`;
}

window.doExport = function(){
  const from = $('#ex-from').value, to = $('#ex-to').value;
  const mgr = $('#ex-mgr').value, veh = $('#ex-veh').value;
  const fromTs = from ? new Date(from+'T00:00:00').getTime() : 0;
  const toTs   = to   ? new Date(to+'T23:59:59').getTime()   : Date.now()+1;
  let list = state.entries.filter(e=>{
    const t = new Date(e.fill_time||e.created_at).getTime();
    if(t < fromTs || t > toTs) return false;
    if(mgr && String(e.manager_id)!==mgr) return false;
    if(veh && String(e.vehicle_id)!==veh) return false;
    return true;
  });
  if(!list.length){ toast('No entries in range','err'); return; }
 
  const rows = list.map(e=>{
    const veh = state.vehicles.find(v=>v.id===e.vehicle_id);
    const row = {
      'Date/Time':fmtDT(e.fill_time||e.created_at),
      'Manager':e.manager_name||'',
      'Vehicle':veh?veh.name:(e.vehicle_name||''),
      'Vehicle Type':veh?veh.type:'',
      'Reg/Asset':veh?(veh.reg_no||''):'',
      'Branch':veh?(veh.branch||''):'',
      'HMR':e.hmr||'',
      'Quantity (L)':+e.quantity||0,
      'Source':e.source==='other'?(e.source_custom||'Other'):(e.source==='bowser_t1'?'Bowser T1':(e.source==='bowser_t2'?'Bowser T2':e.source||'')),
      'Edit Count':e.edit_count||0,
      'Last Edited':e.edited_at?fmtDT(e.edited_at):'',
    };
    state.customFields.forEach(f=>{
      row[f.field_label] = (e.custom_data||{})[f.field_key] || '';
    });
    return row;
  });
 
  // Edit history sheet
  const editRows = [];
  list.forEach(e=>{
    (e.edit_history||[]).forEach(h=>{
      Object.entries(h.diff||{}).forEach(([field,d])=>{
        editRows.push({
          'When':fmtDT(h.at), 'By':h.by, 'Entry ID':e.id,
          'Vehicle':(state.vehicles.find(v=>v.id===e.vehicle_id)||{}).name||e.vehicle_name||'',
          'Field':field, 'Old Value':JSON.stringify(d.old), 'New Value':JSON.stringify(d.new),
        });
      });
    });
  });
 
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows), 'Entries');
  if(editRows.length) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(editRows), 'Edit History');
  XLSX.writeFile(wb, `TASR_Fuel_${from}_to_${to}.xlsx`);
  toast('Excel downloaded','ok');
};

window.saveNewEntry = function(){
  const vehName = $('#ne-vehicle').value.trim();
  const veh = state.vehicles.find(v=>v.name.toLowerCase()===vehName.toLowerCase());
  if(!veh){ toast('Select valid vehicle from list','err'); return; }
  const hmr = parseFloat($('#ne-hmr').value);
  const qty = parseFloat($('#ne-qty').value);
  if(isNaN(hmr)){ toast('HMR required','err'); return; }
  if(isNaN(qty) || qty<=0){ toast('Quantity required','err'); return; }
  const time = $('#ne-time').value;
  if(!time){ toast('Time required','err'); return; }
  const srcEl = document.querySelector('.source-pill.active');
  const src = srcEl ? srcEl.dataset.src : 'bowser_t1';
  const srcCustom = src==='other' ? $('#ne-src-custom').value.trim() : '';
  if(src==='other' && !srcCustom){ toast('Specify "Other" source','err'); return; }
 
  const custom_data = {};
  for(const f of state.customFields){
    const el = $('#ne-cf-'+f.id);
    const v = el ? el.value.trim() : '';
    if(f.required && !v){ toast(f.field_label+' required','err'); return; }
    if(v) custom_data[f.field_key] = v;
  }
 
  addEntry({
    manager_id: state.user.id, manager_name: state.user.name,
    vehicle_id: veh.id, vehicle_name: veh.name,
    hmr, quantity:qty, fill_time:new Date(time).toISOString(),
    source: src, source_custom: srcCustom, custom_data,
  });
  toast('Entry saved'+(state.online?' & syncing':' (offline)'),'ok');
  state.activeTab = 'my-entries';
  renderDash();
};

  closeModal(); renderDash(); toast('Entry updated','ok');
};
 
// ============================================================
// BOOT
// ============================================================
loadPersisted();
ensureManagerSlots();
calcRender();
bootScreen();
updateSyncPill();
 
// Initial pull from server, then periodic sync
(async ()=>{
  if(sb){
    await pullAll();
    bootScreen();              // re-evaluate calc/login after settings load
    if(state.user) renderDash();
  }
})();
setInterval(()=>{ if(state.online) trySync(); }, 15000);
setInterval(()=>{ if(state.online && state.user) pullAll().then(()=>{ if(state.user) renderDash(); }); }, 30000);
</script>
