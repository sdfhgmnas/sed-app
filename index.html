<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Calculator</title>
 
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0891b2">
<meta name="description" content="TASR BharatNext Fuel Manager">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!--
  ============================================================
  TASR BharatNext — Fuel Manager
  Calculator-disguise diesel entry app
  ============================================================
  SETUP:
  1. Create a Supabase project, run supabase-schema.sql in SQL Editor
  2. Paste your Project URL and anon key in the CONFIG block below
  3. Open this HTML in browser. Default secret: 3578, owner pwd: 1234
  4. Login as owner → change passwords, add vehicles, activate managers
  ============================================================
  Works fully offline; queues writes to localStorage and syncs
  when network returns. Sync status pill shows live state.
-->
 
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
 
<style>
:root{
  --bg:#ffffff; --surface:#f8fafc; --surface-2:#f1f5f9;
  --border:#e2e8f0; --border-dark:#cbd5e1;
  --accent:#06b6d4; --accent-dark:#0891b2; --accent-light:#cffafe;
  --text:#0f172a; --text-muted:#64748b; --text-soft:#94a3b8;
  --success:#10b981; --warn:#f59e0b; --danger:#ef4444;
  --radius:10px; --radius-sm:6px;
  --shadow:0 1px 2px rgba(15,23,42,.04), 0 4px 12px rgba(15,23,42,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;
  background:var(--surface);color:var(--text);font-size:14px;line-height:1.4;
  -webkit-tap-highlight-color:transparent;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px;color:inherit}
 
/* ==================== CALCULATOR (Apple-style fullscreen) ==================== */
html{background:#000}
#calc-screen{
  min-height:100vh; min-height:100dvh;
  background:#000;
  flex-direction:column; justify-content:flex-end;
  padding:20px 14px max(20px, env(safe-area-inset-bottom)) 14px;
  max-width:430px; margin:0 auto;
}
#calc-screen.active{ display:flex; }
.calc{ width:100%; background:transparent; padding:0; border-radius:0; box-shadow:none; }
.calc-display{
  background:transparent; padding:30px 14px 20px; margin-bottom:8px;
  text-align:right; color:#fff; min-height:140px;
  display:flex; flex-direction:column; justify-content:flex-end;
  overflow:hidden; word-break:break-all;
}
.calc-history{ font-size:20px; color:#666; min-height:24px; font-weight:300; margin-bottom:4px; }
.calc-current{ font-size:80px; color:#fff; font-weight:200; line-height:1; letter-spacing:-2px; }
.calc-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
.calc-btn{
  aspect-ratio:1/1; border-radius:999px;
  font-size:32px; font-weight:400;
  background:#333; color:#fff;
  display:flex; align-items:center; justify-content:center;
  transition:filter .1s, transform .05s; user-select:none;
}
.calc-btn:active{ filter:brightness(1.5); transform:scale(.97); }
.calc-btn.op{ background:#ff9500; color:#fff; font-size:38px; }
.calc-btn.op:active{ filter:brightness(1.2); }
.calc-btn.eq{ background:#ff9500; color:#fff; font-size:38px; }
.calc-btn.eq:active{ filter:brightness(1.2); }
.calc-btn.clr{ background:#a5a5a5; color:#000; font-size:28px; }
.calc-btn.clr:active{ filter:brightness(1.1); }
.calc-btn.zero{
  grid-column:span 2; aspect-ratio:auto; border-radius:999px;
  text-align:left; justify-content:flex-start; padding-left:32px;
}
@media(max-width:430px){
  .calc-current{font-size:68px}
  .calc-display{min-height:120px;padding:20px 10px 14px}
  .calc-grid{gap:10px}
  .calc-btn{font-size:30px}
  .calc-btn.op,.calc-btn.eq{font-size:34px}
  .calc-btn.zero{padding-left:28px}
}
@media(max-width:340px){
  .calc-current{font-size:56px}
  .calc-btn{font-size:26px}
}
/* Ensure dashboard has its own bg over the black html */
#dash-screen{background:var(--surface)}
 
/* ==================== APP SHELL ==================== */
.screen{display:none;min-height:100vh}
.screen.active{display:block}
.topbar{
  background:#fff;border-bottom:1px solid var(--border);padding:10px 14px;
  display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;
}
.brand{font-weight:700;font-size:15px;color:var(--text);letter-spacing:-.2px}
.brand .accent{color:var(--accent-dark)}
.topbar-spacer{flex:1}
.who{font-size:12px;color:var(--text-muted);display:flex;flex-direction:column;align-items:flex-end;line-height:1.2}
.who b{color:var(--text);font-size:13px}
 
.sync-pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;
}
.sync-pill .dot{width:7px;height:7px;border-radius:50%;background:currentColor}
@keyframes tasrBlink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.35;transform:scale(.85)} }
.sync-live{background:#dcfce7;color:#15803d}
.sync-live .dot{animation:tasrBlink 1.3s infinite}
.sync-pending{background:#fef3c7;color:#a16207}
.sync-pending .dot{animation:tasrBlink 1.0s infinite}
.sync-disconnect{background:#fee2e2;color:#b91c1c}
.sync-disconnect .dot{animation:none}
/* Legacy class aliases kept for backward compatibility */
.sync-online{background:#dcfce7;color:#15803d}
.sync-syncing{background:#fef3c7;color:#a16207}
.sync-offline{background:#fee2e2;color:#b91c1c}
 
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:8px 14px;border-radius:var(--radius-sm);font-weight:600;font-size:13px;
  background:var(--accent);color:#fff;transition:background .15s,transform .05s;
  border:1px solid transparent;
}
.btn:hover{background:var(--accent-dark)}
.btn:active{transform:scale(.97)}
.btn.ghost{background:#fff;color:var(--text);border-color:var(--border-dark)}
.btn.ghost:hover{background:var(--surface-2)}
.btn.danger{background:var(--danger)}
.btn.danger:hover{background:#dc2626}
.btn.success{background:var(--success)}
.btn.small{padding:5px 10px;font-size:12px}
.btn.xs{padding:2px 8px;font-size:11px;border-radius:5px}
.btn.icon{padding:6px 8px}
.btn:disabled{opacity:.5;cursor:not-allowed}
 
/* ==================== LOGIN ==================== */
#login-screen{display:none;align-items:center;justify-content:center;padding:24px;
  background:linear-gradient(180deg,#ecfeff 0%,#f8fafc 100%);}
#login-screen.active{display:flex}
.login-card{
  background:#fff;border-radius:16px;padding:28px 24px;width:100%;max-width:380px;
  box-shadow:var(--shadow);border:1px solid var(--border);
}
.login-title{font-size:20px;font-weight:700;margin-bottom:4px;letter-spacing:-.3px}
.login-sub{color:var(--text-muted);font-size:13px;margin-bottom:20px}
.role-tabs{display:flex;gap:6px;background:var(--surface-2);padding:4px;border-radius:8px;margin-bottom:18px}
.role-tab{flex:1;padding:8px 10px;font-weight:600;font-size:13px;color:var(--text-muted);border-radius:6px}
.role-tab.active{background:#fff;color:var(--accent-dark);box-shadow:0 1px 2px rgba(0,0,0,.05)}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:4px;letter-spacing:.3px;text-transform:uppercase}
.form-row input,.form-row select,.form-row textarea{
  width:100%;padding:10px 12px;border:1px solid var(--border-dark);
  border-radius:var(--radius-sm);background:#fff;color:var(--text);outline:none;
  transition:border-color .15s,box-shadow .15s;
}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{
  border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light);
}
.form-row .hint{font-size:11px;color:var(--text-soft);margin-top:3px}
.msg{padding:8px 12px;border-radius:6px;font-size:12px;margin-bottom:12px}
.msg.err{background:#fee2e2;color:#991b1b}
.msg.ok{background:#dcfce7;color:#166534}
 
/* ==================== DASHBOARD ==================== */
.tabbar{
  background:#fff;border-bottom:1px solid var(--border);
  display:flex;overflow-x:auto;scrollbar-width:none;
}
.tabbar::-webkit-scrollbar{display:none}
.tab{
  padding:11px 14px;font-size:13px;font-weight:600;color:var(--text-muted);
  border-bottom:2px solid transparent;white-space:nowrap;
}
.tab.active{color:var(--accent-dark);border-bottom-color:var(--accent)}
 
.page{padding:14px;display:none;max-width:1100px;margin:0 auto}
.page.active{display:block}
 
.section{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
.section-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px;flex-wrap:wrap}
.section-h h3{font-size:14px;font-weight:700;letter-spacing:-.2px}
.section-h .sub{font-size:11px;color:var(--text-muted);font-weight:500}
 
.grid{display:grid;gap:10px}
.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
@media(max-width:600px){.grid-3{grid-template-columns:1fr 1fr}.grid-2{grid-template-columns:1fr}}
 
table{width:100%;border-collapse:collapse;font-size:13px}
table th{text-align:left;padding:8px 10px;background:var(--surface-2);font-weight:600;color:var(--text-muted);font-size:11px;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--border)}
table td{padding:8px 10px;border-bottom:1px solid var(--surface-2);vertical-align:top}
table tbody tr:hover{background:var(--surface)}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
 
/* ===== STICKY TABLE — frozen header row + first 3 cols (Time/Manager/Vehicle) ===== */
.sticky-table{
  max-height:70vh;overflow:auto;position:relative;
  border:1px solid var(--border);border-radius:var(--radius-sm);
  background:#fff;
}
.sticky-table table{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%}
.sticky-table th,.sticky-table td{background:#fff;border-bottom:1px solid var(--surface-2);white-space:nowrap}
.sticky-table thead th{
  position:sticky;top:0;z-index:5;
  background:var(--surface-2);border-bottom:1px solid var(--border-dark);
}
.sticky-table tbody tr:hover td{background:var(--surface)}
 
/* Sticky-1 = Time column (always present) */
.sticky-table .sticky-1{
  position:sticky;left:0;z-index:3;
  min-width:95px;max-width:95px;
}
/* Sticky-2 = Manager column (when Manager is shown — owner view) */
.sticky-table .sticky-2{
  position:sticky;left:95px;z-index:3;
  min-width:80px;max-width:80px;
}
/* Sticky-3 = Vehicle column (owner view, 3rd frozen) */
.sticky-table .sticky-3{
  position:sticky;left:175px;z-index:3;
  min-width:110px;max-width:110px;
  box-shadow:2px 0 4px rgba(0,0,0,.08);
}
/* Sticky-2-last = Vehicle column when Manager column is hidden (manager view) */
.sticky-table .sticky-2-last{
  position:sticky;left:95px;z-index:3;
  min-width:110px;max-width:110px;
  box-shadow:2px 0 4px rgba(0,0,0,.08);
}
/* Header + frozen-col intersection needs the HIGHEST z-index to stay on top */
.sticky-table thead .sticky-1,
.sticky-table thead .sticky-2,
.sticky-table thead .sticky-3,
.sticky-table thead .sticky-2-last{z-index:6}
/* Keep frozen cells matching the row's hover background */
.sticky-table tbody tr:hover .sticky-1,
.sticky-table tbody tr:hover .sticky-2,
.sticky-table tbody tr:hover .sticky-3,
.sticky-table tbody tr:hover .sticky-2-last{background:var(--surface)}
 
/* ===== VIEW TOGGLE PILLS (Table / Cards) ===== */
.view-toggle{
  display:inline-flex;gap:3px;margin-bottom:10px;
  background:var(--surface);padding:3px;border-radius:8px;
  border:1px solid var(--border);
}
.view-toggle .vt{
  padding:5px 12px;border:none;background:transparent;
  font-size:12px;font-weight:600;color:var(--text-muted);
  border-radius:5px;cursor:pointer;transition:all .15s;
}
.view-toggle .vt:hover{color:var(--text)}
.view-toggle .vt.active{background:#fff;color:var(--accent-dark);box-shadow:0 1px 2px rgba(0,0,0,.08)}
 
/* ===== CARDS VIEW — stacked per-entry cards, no horizontal scroll needed ===== */
.entry-cards{
  display:grid;gap:10px;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
}
.entry-card{
  background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:12px;box-shadow:var(--shadow);
}
.entry-card-h{
  display:flex;justify-content:space-between;align-items:baseline;
  margin-bottom:6px;gap:8px;
}
.entry-card-h .veh{font-weight:700;font-size:14px;color:var(--text)}
.entry-card-h .time{font-size:11px;color:var(--text-muted);white-space:nowrap}
.entry-card-meta{font-size:12px;color:var(--text-muted);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--surface-2)}
.entry-card-grid{
  display:grid;grid-template-columns:auto 1fr;gap:6px 12px;font-size:12px;
}
.entry-card-grid .lbl{color:var(--text-muted);font-size:11px;padding-top:1px}
.entry-card-grid .val{font-weight:500;color:var(--text);text-align:right}
.entry-card-actions{
  margin-top:10px;padding-top:8px;border-top:1px solid var(--surface-2);
  display:flex;gap:6px;justify-content:flex-end;
}
 
.kpi{background:linear-gradient(135deg,#ecfeff 0%,#cffafe 100%);border:1px solid #a5f3fc;border-radius:var(--radius);padding:12px}
.kpi .lbl{font-size:11px;color:var(--accent-dark);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.kpi .val{font-size:22px;font-weight:700;color:var(--text);margin-top:2px}
.kpi .sub{font-size:11px;color:var(--text-muted);margin-top:2px}
 
/* Admin lock button — fixed top-right, accessible from any screen */
.admin-btn{
  position:fixed;top:8px;right:8px;z-index:200;
  width:30px;height:30px;border-radius:8px;
  background:rgba(15,23,42,.15);color:rgba(255,255,255,.92);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;border:1px solid rgba(255,255,255,.15);
  backdrop-filter:blur(8px);
  transition:background .15s,transform .05s;
}
.admin-btn:active{transform:scale(.92)}
.admin-btn:hover{background:rgba(15,23,42,.3)}
/* When on a light-bg screen, swap colors */
body.lightbg .admin-btn{
  background:rgba(255,255,255,.7);color:#0f172a;border-color:var(--border-dark);
}
 
/* Disabled screen */
#disabled-screen{display:none;min-height:100vh;align-items:center;justify-content:center;padding:24px;
  background:linear-gradient(180deg,#0f172a 0%,#1e293b 100%);color:#fff}
#disabled-screen.active{display:flex}
.disabled-card{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:18px;padding:36px 28px;max-width:420px;width:100%;text-align:center;
  backdrop-filter:blur(8px);
}
.disabled-card .lock-big{font-size:56px;margin-bottom:14px}
.disabled-card h2{font-size:22px;font-weight:700;margin-bottom:10px;letter-spacing:-.3px}
.disabled-card .msg-text{font-size:15px;line-height:1.5;color:rgba(255,255,255,.85);white-space:pre-wrap}
.disabled-card .footnote{margin-top:24px;font-size:11px;color:rgba(255,255,255,.5)}
.bowser-card{
  background:#fff;border:1px solid var(--border);border-radius:var(--radius);
  padding:12px;box-shadow:var(--shadow);
}
.bowser-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;gap:8px;flex-wrap:wrap}
.bowser-h .bn{font-size:13px;font-weight:700;letter-spacing:.3px}
.bowser-h .bv{font-size:13px;color:var(--text-muted)}
.bowser-h .bv b{font-size:20px;color:var(--text)}
.bowser-bar{height:10px;background:var(--surface-2);border-radius:999px;overflow:hidden;margin-bottom:6px}
.bowser-fill{height:100%;border-radius:999px;transition:width .3s,background .3s}
.bowser-meta{font-size:11px;color:var(--text-muted);display:flex;justify-content:space-between;align-items:center}
.bowser-meta .refill-btn{font-size:11px;padding:3px 10px;background:var(--accent);color:#fff;border-radius:999px;font-weight:600}
.bowser-meta .refill-btn:hover{background:var(--accent-dark)}
 
/* Bowser stock banner (above source pills in new entry) */
.bowser-banner{
  display:flex;gap:10px;padding:10px 12px;background:var(--surface);
  border-radius:var(--radius-sm);margin-bottom:6px;font-size:12px;
}
.bowser-banner .b-item{flex:1;display:flex;flex-direction:column;align-items:center}
.bowser-banner .b-item .lbl{color:var(--text-muted);font-weight:600;font-size:10px;letter-spacing:.4px;text-transform:uppercase}
.bowser-banner .b-item .val{font-weight:700;font-size:15px;margin-top:2px}
.bowser-banner .b-item .val.low{color:var(--danger)}
.bowser-banner .b-item .val.mid{color:var(--warn)}
.bowser-banner .b-item .val.ok{color:var(--success)}
 
.empty{text-align:center;padding:30px 20px;color:var(--text-muted);font-size:13px}
.empty .em{font-size:30px;margin-bottom:6px}
 
.badge{display:inline-block;padding:2px 7px;border-radius:999px;font-size:11px;font-weight:600}
.badge.ok{background:#dcfce7;color:#166534}
.badge.off{background:#fee2e2;color:#991b1b}
.badge.warn{background:#fef3c7;color:#92400e}
.badge.info{background:#dbeafe;color:#1e40af}
 
.row-actions{display:flex;gap:6px;flex-wrap:wrap}
.icon-btn{
  width:28px;height:28px;border-radius:6px;display:inline-flex;align-items:center;
  justify-content:center;font-size:14px;background:var(--surface-2);color:var(--text-muted);
}
.icon-btn:hover{background:var(--surface)}
.icon-btn.danger{color:var(--danger)}
.icon-btn.danger:hover{background:#fee2e2}
 
/* Modal */
.modal-bg{
  position:fixed;inset:0;background:rgba(15,23,42,.55);
  display:none;align-items:center;justify-content:center;padding:16px;z-index:200;
}
.modal-bg.active{display:flex}
.modal{
  background:#fff;border-radius:14px;max-width:520px;width:100%;
  max-height:90vh;overflow-y:auto;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.3);
}
.modal-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.modal-h h3{font-size:16px;font-weight:700}
.modal-x{font-size:22px;color:var(--text-muted);width:30px;height:30px;border-radius:6px}
.modal-x:hover{background:var(--surface-2)}
 
/* Toast */
.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#0f172a;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;
  font-weight:500;opacity:0;transition:all .25s;z-index:300;pointer-events:none;
  max-width:90vw;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--danger)}
.toast.ok{background:var(--success)}
 
/* Entry form specifics */
.source-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
 
/* PIN Pad */
.pin-section{background:var(--surface);border-radius:12px;padding:14px;margin-bottom:8px}
.pin-display{display:flex;justify-content:center;gap:12px;margin-bottom:14px;padding:8px;min-height:28px;align-items:center;flex-wrap:wrap}
.pin-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--border-dark);background:transparent;transition:transform .12s,background .12s,border-color .12s}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);transform:scale(1.15)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pin-btn{
  height:54px;border-radius:12px;background:#fff;border:1px solid var(--border-dark);
  font-size:22px;font-weight:500;color:var(--text);
  transition:transform .05s,background .15s;user-select:none;
  display:flex;align-items:center;justify-content:center;
}
.pin-btn:active{transform:scale(.94);background:var(--accent-light)}
.pin-btn.pin-back{background:var(--surface-2);color:var(--text-muted);font-size:20px}
.pin-btn.pin-ok{background:var(--accent);color:#fff;font-weight:600;font-size:18px}
.pin-btn.pin-ok:active{background:var(--accent-dark)}
.source-pill{
  flex:1;min-width:80px;padding:9px 10px;border:1px solid var(--border-dark);
  border-radius:var(--radius-sm);background:#fff;font-weight:600;font-size:12px;
  color:var(--text-muted);text-align:center;transition:all .15s;
}

// ============================================================

const $ = s => document.querySelector(s);

const uuid = () => {
  if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
  // RFC4122 v4 fallback
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random()*16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
};
// Migrate any non-UUID IDs in persisted state (from earlier buggy versions)
function migrateIdsToUuid(){
  const uuidRe = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
  const idMap = {};
  let changed = false;
  // 1. Fix IDs in state arrays
  ['vehicles','customFields','entries'].forEach(key => {
    (state[key]||[]).forEach(item => {
      if(item && (!item.id || !uuidRe.test(item.id))){
        const oldId = item.id;
        item.id = uuid();
        if(oldId) idMap[oldId] = item.id;
        changed = true;
      }
    });
  });
  // 2. Cascade-fix vehicle_id refs in entries
  (state.entries||[]).forEach(e => {
    if(e && e.vehicle_id && idMap[e.vehicle_id]){
      e.vehicle_id = idMap[e.vehicle_id];
      changed = true;
    }
  });
  // 3. ALWAYS scan pendingOps. For UUID-tables, fix via idMap or DROP if unfixable.
  const needsUuid = {vehicles:1, custom_fields:1, entries:1};
  const cleaned = [];
  for(const op of (state.pendingOps||[])){
    if(!op || !op.data){ cleaned.push(op); continue; }
    let drop = false;
    if(needsUuid[op.table] && op.data.id && !uuidRe.test(op.data.id)){
      if(idMap[op.data.id]){ op.data.id = idMap[op.data.id]; changed = true; }
      else { drop = true; changed = true; }
    }
    if(op.table === 'entries' && op.data.vehicle_id && idMap[op.data.vehicle_id]){
      op.data.vehicle_id = idMap[op.data.vehicle_id];
      changed = true;
    }
    if(!drop) cleaned.push(op);
  }
  state.pendingOps = cleaned;
  if(changed){
    persist();
    console.log('[TASR Migration] vehicles:'+state.vehicles.length+' entries:'+state.entries.length+' pendingOps:'+state.pendingOps.length);
  }
}

// BOWSER STOCK (T1 & T2 — capacity 3200 L each)
// ============================================================
function getBowserStock(tank){ return +(state.settings['bowser_'+tank+'_stock']) || 0; }
function getBowserCapacity(tank){ return +(state.settings['bowser_'+tank+'_capacity']) || 3200; }
 
// Apply the stock delta when an entry is created, updated, or deleted.
// Pass oldEntry=null for new entries; newEntry=null when the entry is being removed.
function applyBowserDelta(oldEntry, newEntry){
  const sources = { bowser_t1: 't1', bowser_t2: 't2' };
  const delta = { t1: 0, t2: 0 };
  if(oldEntry && sources[oldEntry.source]) delta[sources[oldEntry.source]] += +(oldEntry.quantity||0); // restore
  if(newEntry && sources[newEntry.source]) delta[sources[newEntry.source]] -= +(newEntry.quantity||0); // consume
  ['t1','t2'].forEach(tank => {
    if(delta[tank] === 0) return;
    const key = 'bowser_'+tank+'_stock';
    const curr = +(state.settings[key]) || 0;
    const cap = getBowserCapacity(tank);
    const next = Math.max(0, Math.min(cap, curr + delta[tank]));
    updateSetting(key, next);
  });
}

// ============================================================
const calcState = { expr:'', history:'', secret:'' };
 
function calcRender(){
  $('#calc-current').textContent = calcState.expr || '0';
  $('#calc-history').innerHTML = calcState.history || '&nbsp;';
}
 
function calcPress(k){
  // track secret unlock — any digit pressed appends; non-digit clears
  if(/^[0-9]$/.test(k)){
    calcState.secret = (calcState.secret + k).slice(-8);
    const code = state.settings.secret_code || DEFAULT_SECRET;
    if(calcState.secret.endsWith(code)){
      calcState.secret = '';
      // Honor calculator-enabled toggle by allowing unlock always for owner;
      // managers will fail to login if there are no active managers, but
      // the secret-code transition itself stays available.
      gotoLogin();
      return;
    }
  } else {
    calcState.secret = '';
  }
 
  if(k==='C'){ calcState.expr=''; calcState.history=''; calcRender(); return; }
  if(k==='='){
    try{
      const expr = calcState.expr.replace(/×/g,'*').replace(/÷/g,'/').replace(/%/g,'/100');
      if(!expr){ return; }
      // safe eval: only allow digits and basic ops
      if(!/^[\d+\-*/.() ]+$/.test(expr)){ calcState.expr='Err'; calcRender(); return; }
      // eslint-disable-next-line no-new-func
      const r = Function('"use strict";return ('+expr+')')();
      calcState.history = calcState.expr + ' =';
      calcState.expr = String(Number.isFinite(r) ? +r.toFixed(8) : 'Err');
      calcRender();
    }catch(e){ calcState.expr='Err'; calcRender(); }
    return;
  }
  if(k==='±'){
    if(calcState.expr.startsWith('-')) calcState.expr = calcState.expr.slice(1);
    else if(calcState.expr) calcState.expr = '-' + calcState.expr;
    calcRender(); return;
  }
  // append
  calcState.expr += k;
  calcRender();
}
 
$('#calc-screen').addEventListener('click', e=>{

  if(b) calcPress(b.dataset.k);
});
 
// keyboard support
document.addEventListener('keydown', e=>{
  if(!$('#calc-screen').classList.contains('active')) return;
  if(/^[0-9.]$/.test(e.key)) calcPress(e.key);
  else if(e.key==='+'||e.key==='-') calcPress(e.key);
  else if(e.key==='*') calcPress('×');
  else if(e.key==='/') { e.preventDefault(); calcPress('÷'); }
  else if(e.key==='Enter'||e.key==='=') calcPress('=');
  else if(e.key==='Backspace') { calcState.expr = calcState.expr.slice(0,-1); calcRender(); }
  else if(e.key==='Escape') calcPress('C');
});

function makePinPad(containerEl, opts){
  opts = opts || {};
  let pin = '';
  const minDots = opts.minDots || 4;
  const maxLen = opts.maxLen || 8;
 
  containerEl.innerHTML = `
    <div class="pin-section">
      <div class="pin-display"></div>
      <div class="pin-pad">
        <button type="button" class="pin-btn" data-d="1">1</button>
        <button type="button" class="pin-btn" data-d="2">2</button>
        <button type="button" class="pin-btn" data-d="3">3</button>
        <button type="button" class="pin-btn" data-d="4">4</button>
        <button type="button" class="pin-btn" data-d="5">5</button>
        <button type="button" class="pin-btn" data-d="6">6</button>
        <button type="button" class="pin-btn" data-d="7">7</button>
        <button type="button" class="pin-btn" data-d="8">8</button>
        <button type="button" class="pin-btn" data-d="9">9</button>
        <button type="button" class="pin-btn pin-back" data-d="back">⌫</button>
        <button type="button" class="pin-btn" data-d="0">0</button>
        <button type="button" class="pin-btn pin-ok" data-d="ok">✓</button>
      </div>
    </div>
  `;
  const display = containerEl.querySelector('.pin-display');
  const pad = containerEl.querySelector('.pin-pad');
 
  function render(){
    const shown = Math.max(pin.length, minDots);
    display.innerHTML = Array.from({length:shown}, (_,i) =>
      `<span class="pin-dot ${i<pin.length?'filled':''}"></span>`).join('');
  }
  function tryAutoSubmit(){
    if(!opts.expectedLength || !opts.onSubmit) return false;
    const expected = typeof opts.expectedLength === 'function' ? opts.expectedLength() : opts.expectedLength;
    if(expected && pin.length === expected){
      setTimeout(() => { try { opts.onSubmit(pin); } catch(e){ console.error(e); } }, 120);
      return true;
    }
    return false;
  }
  function press(d){
    if(d==='back'){ pin = pin.slice(0,-1); render(); return; }
    if(d==='ok'){ if(opts.onSubmit) opts.onSubmit(pin); return; }
    if(/^\d$/.test(d) && pin.length<maxLen){ pin += d; render(); tryAutoSubmit(); return; }
  }
  pad.addEventListener('click', e=>{
    const b = e.target.closest('[data-d]'); if(b) press(b.dataset.d);
  });
  render();
  return {
    getPin: ()=>pin,
    clear: ()=>{ pin=''; render(); },
  };
}

function updateSyncPill(){
  const p = $('#sync-pill'), t = $('#sync-text');
  if(!sb){ p.className = 'sync-pill sync-disconnect'; t.textContent = 'Disconnect'; return; }
  if(state.syncing){ p.className='sync-pill sync-pending'; t.textContent='Syncing…'; return; }
  if(!state.online){ p.className='sync-pill sync-disconnect'; t.textContent='Disconnect'; return; }
  if(state.pendingOps.length>0){ p.className='sync-pill sync-pending'; t.textContent='Pending '+state.pendingOps.length; return; }
  p.className = 'sync-pill sync-live'; t.textContent = 'Live';
}
 
window.addEventListener('online', ()=>{ state.online = true; updateSyncPill(); trySync(); });
window.addEventListener('offline',()=>{ state.online = false; updateSyncPill(); });
 
async function pullAll(){
  if(!sb) return;
  try{
    state.syncing = true; _syncingStart = Date.now(); updateSyncPill();
    const [veh, mgr, cf, ent, st] = await Promise.all([
      sb.from('vehicles').select('*').order('name'),
      sb.from('managers').select('*').order('id'),
      sb.from('custom_fields').select('*').order('sort_order'),
      sb.from('entries').select('*').order('fill_time',{ascending:false}).limit(2000),
      sb.from('settings').select('*'),
    ]);
    if(!veh.error) state.vehicles = veh.data||[];
    if(!mgr.error){
      // merge remote managers with local slots
      const remote = mgr.data||[];
      state.managers = [];
      for(let i=1;i<=10;i++){
        const r = remote.find(m=>m.id===i);
        state.managers.push(r || {id:i, name:'Manager '+i, password:'1234', active:false, updated_at:new Date().toISOString()});
      }
    }
    if(!cf.error)  state.customFields = cf.data||[];
    if(!ent.error) state.entries = ent.data||[];
    if(!st.error && st.data){
      st.data.forEach(r => { state.settings[r.key] = r.value; });
    }
    persist();
  }catch(e){ console.warn('pull error', e); }
  finally{ state.syncing=false; _syncingStart = 0; updateSyncPill(); }
}
 
function queueOp(op){
  state.pendingOps.push({...op, ts:Date.now(), id:uuid()});
  persist(); updateSyncPill();
  if(state.online && sb) trySync();
}
 
async function trySync(){
  if(!sb || !state.online || state.syncing || state.pendingOps.length===0) return;
  // Wrap whole flow in try/finally so syncing flag CANNOT get stuck on
  try {
    state.syncing = true; _syncingStart = Date.now(); updateSyncPill();
    const ops = [...state.pendingOps];
    for(const op of ops){
      try{
        const { table, action, data, match } = op;
        let res;
        if(action==='upsert') res = await sb.from(table).upsert(data);
        else if(action==='insert') res = await sb.from(table).insert(data);
        else if(action==='update') res = await sb.from(table).update(data).match(match);
        else if(action==='delete') res = await sb.from(table).delete().match(match);
        if(res && res.error){
          console.warn('sync error', op, res.error);
          toast('Sync error: '+(res.error.message||'check console'), 'err');
          break;
        }
        state.pendingOps = state.pendingOps.filter(p=>p.id!==op.id);
        persist();
      }catch(e){ console.warn('sync exception', e); break; }
    }
  } finally {
    state.syncing = false; _syncingStart = 0;
    updateSyncPill();
    // Best-effort fresh pull after a successful flush; never let it leave syncing stuck
    if(state.pendingOps.length===0 && sb && state.online){
      try { await pullAll(); } catch(e){ console.warn('post-sync pull failed', e); }
    }
    try { renderDash({auto:true}); } catch(e){}
  }
}
 
// Watchdog: if syncing has been true for >20s, force-reset. Belt-and-suspenders
// safety net so the pill cannot ever get permanently stuck on "Syncing…".
let _syncingStart = 0;
setInterval(()=>{
  if(state.syncing && _syncingStart && Date.now() - _syncingStart > 20000){
    console.warn('[TASR] syncing watchdog tripped — forcing reset');
    state.syncing = false; _syncingStart = 0; updateSyncPill();
  }
}, 5000);

function updateEntry(id, patch, editor){
  const i = state.entries.findIndex(x=>x.id===id);
  if(i<0) return;
  const prev = state.entries[i];
  const diff = {};
  Object.keys(patch).forEach(k=>{
    if(JSON.stringify(prev[k]) !== JSON.stringify(patch[k])){
      diff[k] = {old: prev[k], new: patch[k]};
    }
  });
  const history = Array.isArray(prev.edit_history) ? [...prev.edit_history] : [];
  if(Object.keys(diff).length){
    history.push({at:new Date().toISOString(), by:editor||(state.user?state.user.name:'unknown'), diff});
  }
  const next = {...prev, ...patch, edited_at:new Date().toISOString(), edit_count:(prev.edit_count||0)+1, edit_history:history};
  state.entries[i] = next;
  applyBowserDelta(prev, next);
  persist();
  queueOp({table:'entries', action:'upsert', data:next});
}

// ---------- AVG CALCULATION ----------
// mode='trip'     : (curr_hmr - immediate prev_hmr) / curr_qty   (km/L or L/hr)
// mode='full2full': (curr_hmr - last_FULL_hmr) / sum(qty of all fills since last FULL incl. this)
//                   ↑ accurate mileage — only computed for entries where fill_type='full'
function calcAvg(entry, mode){
  mode = mode || state.avgMode || 'trip';
  const veh = state.vehicles.find(v => v.id === entry.vehicle_id);
  if(!veh) return null;
  const isMachine = veh.type === 'machine';
  const t = new Date(entry.fill_time || entry.created_at).getTime();
  const unit = isMachine ? 'L/hr' : 'km/L';
 
  if(mode === 'trip'){
    const prev = state.entries
      .filter(e => e.vehicle_id === entry.vehicle_id && e.id !== entry.id)
      .filter(e => new Date(e.fill_time || e.created_at).getTime() < t)
      .sort((a,b) => new Date(b.fill_time||b.created_at) - new Date(a.fill_time||a.created_at))[0];
    if(!prev) return null;
    const diff = (+entry.hmr || 0) - (+prev.hmr || 0);
    const qty = +entry.quantity || 0;
    if(diff <= 0 || qty <= 0) return null;
    const value = isMachine ? qty/diff : diff/qty;
    return { value, formatted: value.toFixed(2)+' '+unit, meaningful: entry.fill_type==='full', mode };
  }
 
  // full2full
  if(entry.fill_type !== 'full') return null;
  const sameVeh = state.entries.filter(e => e.vehicle_id === entry.vehicle_id);
  const prevFull = sameVeh
    .filter(e => e.id !== entry.id && e.fill_type === 'full' && new Date(e.fill_time||e.created_at).getTime() < t)
    .sort((a,b) => new Date(b.fill_time||b.created_at) - new Date(a.fill_time||a.created_at))[0];
  if(!prevFull) return null;
  const prevT = new Date(prevFull.fill_time||prevFull.created_at).getTime();
  // sum all fills after prevFull up to & including current entry
  const between = sameVeh.filter(e => {
    const et = new Date(e.fill_time||e.created_at).getTime();
    return et > prevT && et <= t;
  });
  const totalQty = between.reduce((s,e) => s + (+e.quantity || 0), 0);
  const diff = (+entry.hmr || 0) - (+prevFull.hmr || 0);
  if(diff <= 0 || totalQty <= 0) return null;
  const value = isMachine ? totalQty/diff : diff/totalQty;
  return { value, formatted: value.toFixed(2)+' '+unit, meaningful: true, mode, span: between.length };
}
 
// Manual Consumption — auto-derived from "angul naap" (vehicle dipstick) stock readings.
// Stock is measured PRE-FILL (dipstick before adding fuel). Formula:
//   consumed = prev.stock + prev.qty − cur.stock
// Then convert to km/L or L/hr using the HMR/km gap.
// Returns { value, formatted, ... } on success OR { reason } when it can't compute,
// so the UI can show WHY the value is missing.
function calcManualConsumption(entry){
  const veh = state.vehicles.find(v => v.id === entry.vehicle_id);
  if(!veh) return { reason: 'Vehicle not found in master list' };
  const isMachine = veh.type === 'machine';
  const unit = isMachine ? 'L/hr' : 'km/L';
  const t = new Date(entry.fill_time || entry.created_at).getTime();
  const prev = state.entries
    .filter(e => e.vehicle_id === entry.vehicle_id && e.id !== entry.id)
    .filter(e => new Date(e.fill_time || e.created_at).getTime() < t)
    .sort((a,b) => new Date(b.fill_time||b.created_at) - new Date(a.fill_time||a.created_at))[0];
  if(!prev) return { reason: 'First entry for this vehicle — no previous fill to compare against' };
 
  const prevStock = parseFloat(prev.stock);
  if(isNaN(prevStock)) return { reason: 'Previous entry has no Vehicle Stock (Angul Naap) reading' };
  const prevQty   = parseFloat(prev.quantity);
  if(isNaN(prevQty)) return { reason: 'Previous entry has no Quantity' };
  const curStock  = parseFloat(entry.stock);
  if(isNaN(curStock)) return { reason: 'This entry has no Vehicle Stock (Angul Naap) reading' };
 
  const consumed = (prevStock + prevQty) - curStock;
  if(consumed <= 0) return { reason: `Stock readings inconsistent — computed consumption is ${consumed.toFixed(1)} L (current stock cannot exceed prev stock + prev fill)` };
 
  const prevHmr = parseFloat(prev.hmr);
  if(isNaN(prevHmr)) return { reason: 'Previous entry has no HMR/KM reading' };
  const curHmr  = parseFloat(entry.hmr);
  if(isNaN(curHmr)) return { reason: 'This entry has no HMR/KM reading' };
 
  const delta = curHmr - prevHmr;
  if(delta <= 0) return { reason: `HMR/KM did not increase (Δ ${delta}) — check readings` };
 
  const value = isMachine ? consumed/delta : delta/consumed;
  return { value, formatted: value.toFixed(2)+' '+unit, unit, consumed, delta };
}
 
// Difference between Manual (stock-derived) and GPS (admin-entered) consumption.
// Returns { delta, pct, severity } or null when either side is missing.
function calcConsDiff(entry){
  const manual = calcManualConsumption(entry);
  const gps = (entry.consumption != null && entry.consumption !== '' && !isNaN(+entry.consumption))
    ? +entry.consumption : null;
  if(!manual || manual.value === undefined || gps == null) return null;
  const delta = manual.value - gps;
  const pct = gps !== 0 ? (delta / gps) * 100 : 0;
  const absPct = Math.abs(pct);
  const severity = absPct < 10 ? 'ok' : (absPct < 20 ? 'warn' : 'bad');
  return { delta, pct, severity, manualVal: manual.value, gpsVal: gps, unit: manual.unit };
}

// Build a per-entry display bag so Table + Cards share the same formatting
function buildEntryDisplay(e){
  const veh = state.vehicles.find(v=>v.id===e.vehicle_id);
  const vehDisplay = veh ? (veh.reg_no || veh.name) : (e.vehicle_name || '—');
  const isMachine = veh && veh.type === 'machine';
  const unit = isMachine ? 'L/hr' : 'km/L';
  const isOwner = state.user && state.user.role === 'owner';
  const src = e.source==='other' ? (e.source_custom||'Other')
            : e.source==='bowser_t1' ? 'Bowser T1'
            : e.source==='bowser_t2' ? 'Bowser T2' : (e.source||'—');
  const editBadge = e.edit_count>0 ? `<span class="badge warn" title="Edited ${e.edit_count}×">✎ ${e.edit_count}</span>` : '';
  const fillBadge = e.fill_type === 'full'
    ? '<span class="badge ok">Full</span>'
    : (e.fill_type === 'not_full' ? '<span class="badge warn">Partial</span>' : '—');
  const avg = calcAvg(e);
  const avgCell = avg
    ? `<b style="color:${avg.meaningful?'var(--success)':'var(--text-muted)'}">${avg.formatted}</b>${avg.meaningful?'':' <span style="font-size:10px;color:var(--text-soft)">~</span>'}`
    : '—';
  const manual = calcManualConsumption(e);
  const manualCell = (manual && manual.value !== undefined)
    ? `<b>${manual.value.toFixed(2)}</b> <span style="font-size:10px;color:var(--text-soft)">${unit}</span>`
    : `<span style="color:var(--text-soft);cursor:help;border-bottom:1px dotted var(--text-soft)" title="${escapeHtml(manual && manual.reason ? manual.reason : 'Cannot compute')}">—</span>`;
  let gpsCell;
  if(e.consumption != null && e.consumption !== '' && !isNaN(+e.consumption)){
    const cv = (+e.consumption).toFixed(2);
    gpsCell = isOwner
      ? `<b style="color:var(--accent-dark)">${cv}</b> <span style="font-size:10px;color:var(--text-soft)">${unit}</span> <button class="btn xs ghost" style="font-size:10px;padding:1px 5px;margin-left:2px" onclick="setConsumptionModal('${e.id}')" title="Edit GPS consumption">✎</button>`
      : `<b style="color:var(--accent-dark)">${cv}</b> <span style="font-size:10px;color:var(--text-soft)">${unit}</span>`;
  } else {
    gpsCell = isOwner
      ? `<button class="btn xs ghost" style="font-size:11px;padding:2px 8px" onclick="setConsumptionModal('${e.id}')">+ Add</button>`
      : '<span style="color:var(--text-soft)">—</span>';
  }
  const diff = calcConsDiff(e);
  let diffCell = '<span style="color:var(--text-soft)">—</span>';
  if(diff){
    const color = diff.severity === 'ok' ? 'var(--success)'
                : diff.severity === 'warn' ? '#a16207' : 'var(--danger)';
    const sign = diff.delta > 0 ? '+' : '';
    diffCell = `<b style="color:${color}">${sign}${diff.delta.toFixed(2)}</b><br><span style="font-size:10px;color:var(--text-soft)">${sign}${diff.pct.toFixed(1)}%</span>`;
  }
  return { veh, vehDisplay, unit, src, editBadge, fillBadge, avgCell, manualCell, gpsCell, diffCell };
}

function computeVehicleStats(vehicleId){
  const veh = state.vehicles.find(v => v.id === vehicleId);
  const isMachine = !!(veh && veh.type === 'machine');
  const entries = state.entries
    .filter(e => e.vehicle_id === vehicleId)
    .sort((a,b) => new Date(a.fill_time||a.created_at) - new Date(b.fill_time||b.created_at));
 
  const f2fPoints = [];
  for(const e of entries){
    const a = calcAvg(e, 'full2full');
    if(a){
      f2fPoints.push({
        date: e.fill_time || e.created_at,
        time: new Date(e.fill_time||e.created_at).getTime(),
        value: a.value,
        entry: e,
      });
    }
  }
 
  const totalLiters = entries.reduce((s,e) => s + (+e.quantity||0), 0);
  const firstHmr = entries.length ? +entries[0].hmr||0 : 0;
  const lastHmr  = entries.length ? +entries[entries.length-1].hmr||0 : 0;
  const hmrDiff  = Math.max(0, lastHmr - firstHmr);
 
  const values = f2fPoints.map(p => p.value);
  const avg   = values.length ? values.reduce((s,v)=>s+v,0)/values.length : null;
  const best  = values.length ? (isMachine ? Math.min(...values) : Math.max(...values)) : null;
  const worst = values.length ? (isMachine ? Math.max(...values) : Math.min(...values)) : null;
  const latest = f2fPoints.length ? f2fPoints[f2fPoints.length-1].value : null;
 
  let latestDelta = null;
  if(latest != null && avg != null && avg > 0){
    latestDelta = ((latest - avg) / avg) * 100;
  }
  // For vehicles: lower km/L = worse; for machines: higher L/hr = worse.
  const isAlert = latestDelta != null &&
    (isMachine ? latestDelta > 15 : latestDelta < -15);
 
  return { entries, f2fPoints, totalLiters, hmrDiff, avg, best, worst, latest, latestDelta, isAlert, isMachine };
}

function renderMileageChart(veh, stats){
  const unit = stats.isMachine ? 'L/hr' : 'km/L';
  const pts = stats.f2fPoints;
  if(pts.length < 2){
    return `<div class="section" style="margin-top:14px">
      <div class="section-h"><h3>Mileage Trend</h3></div>
      <div class="empty"><div class="em">📈</div>Need at least 2 Full-to-Full data points to chart trend.${pts.length===1?' One available — record more Full fills.':''}</div>
    </div>`;
  }
  const W = 600, H = 240, PAD_L = 44, PAD_R = 12, PAD_T = 20, PAD_B = 36;
  const innerW = W - PAD_L - PAD_R;
  const innerH = H - PAD_T - PAD_B;
  const values = pts.map(p => p.value);
  const minV = Math.min(...values), maxV = Math.max(...values);
  const span = (maxV - minV) || 1;
  const yMin = Math.max(0, minV - span * 0.15);
  const yMax = maxV + span * 0.15;
  const xAt = i => PAD_L + (i / Math.max(1, pts.length - 1)) * innerW;
  const yAt = v => PAD_T + (1 - (v - yMin) / Math.max(0.0001, yMax - yMin)) * innerH;
 
  const polylinePts = pts.map((p, i) => xAt(i) + ',' + yAt(p.value)).join(' ');
  const avgY = yAt(stats.avg);
 
  const circles = pts.map((p, i) => {
    const x = xAt(i), y = yAt(p.value);
    const badThreshold = stats.isMachine ? stats.avg * 1.15 : stats.avg * 0.85;
    const isBad = stats.isMachine ? p.value > badThreshold : p.value < badThreshold;
    const color = isBad ? '#ef4444' : '#06b6d4';
    return `<g><circle cx="${x}" cy="${y}" r="5" fill="${color}" stroke="#fff" stroke-width="2"></circle>
      <text x="${x}" y="${y-10}" text-anchor="middle" font-size="10" font-weight="600" fill="${isBad?'#991b1b':'#0f172a'}">${p.value.toFixed(1)}</text></g>`;
  }).join('');
 
  const yTickValues = [yMin, (yMin+yMax)/2, yMax];
  const yTicks = yTickValues.map(v => `
    <text x="${PAD_L-6}" y="${yAt(v)+3}" text-anchor="end" font-size="10" fill="#64748b">${v.toFixed(1)}</text>
    <line x1="${PAD_L}" x2="${W-PAD_R}" y1="${yAt(v)}" y2="${yAt(v)}" stroke="#e2e8f0" stroke-width="1"></line>
  `).join('');
 
  const idxs = pts.length <= 4 ? pts.map((_,i)=>i) : [0, Math.floor(pts.length/3), Math.floor(2*pts.length/3), pts.length-1];
  const xLabels = idxs.map(i => {
    const d = new Date(pts[i].date);
    return `<text x="${xAt(i)}" y="${H - PAD_B + 18}" text-anchor="middle" font-size="10" fill="#64748b">${d.toLocaleDateString('en-IN',{day:'2-digit',month:'short'})}</text>`;
  }).join('');
 
  return `
    <div class="section" style="margin-top:14px">
      <div class="section-h">
        <h3>Mileage Trend (Full-to-Full)</h3>
        <span class="sub">${pts.length} data points · unit ${unit}</span>
      </div>
      <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
        <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="width:100%;min-width:480px;height:auto;display:block">
          ${yTicks}
          <line x1="${PAD_L}" x2="${W-PAD_R}" y1="${avgY}" y2="${avgY}" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,4"></line>
          <text x="${W-PAD_R-2}" y="${avgY-4}" text-anchor="end" font-size="10" fill="#f59e0b" font-weight="700">avg ${stats.avg.toFixed(2)}</text>
          <polyline points="${polylinePts}" fill="none" stroke="#06b6d4" stroke-width="2.5" stroke-linejoin="round"></polyline>
          ${circles}
          ${xLabels}
          <text x="${PAD_L-32}" y="${PAD_T + innerH/2}" transform="rotate(-90, ${PAD_L-32}, ${PAD_T + innerH/2})" text-anchor="middle" font-size="11" fill="#64748b" font-weight="600">${unit}</text>
        </svg>
      </div>
      <div style="font-size:11px;color:var(--text-muted);margin-top:10px;display:flex;gap:14px;flex-wrap:wrap">
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#06b6d4;vertical-align:middle"></span> Normal</span>
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#ef4444;vertical-align:middle"></span> ${stats.isMachine?'>15% above avg':'>15% below avg'}</span>
        <span><span style="display:inline-block;width:14px;height:2px;background:#f59e0b;vertical-align:middle"></span> Average</span>
      </div>
    </div>
  `;
}

window.doExport = function(){
  const from = $('#ex-from').value, to = $('#ex-to').value;
  const mgr = $('#ex-mgr').value, veh = $('#ex-veh').value;
  const fromTs = from ? new Date(from+'T00:00:00').getTime() : 0;
  const toTs   = to   ? new Date(to+'T23:59:59').getTime()   : Date.now()+1;
  let list = state.entries.filter(e=>{
    const t = new Date(e.fill_time||e.created_at).getTime();
    if(t < fromTs || t > toTs) return false;
    if(mgr && String(e.manager_id)!==mgr) return false;
    if(veh && String(e.vehicle_id)!==veh) return false;
    return true;
  });
  if(!list.length){ toast('No entries in range','err'); return; }
 
  const rows = list.map(e=>{
    const veh = state.vehicles.find(v=>v.id===e.vehicle_id);
    const row = {
      'Date/Time':fmtDT(e.fill_time||e.created_at),
      'Manager':e.manager_name||'',
      'Reg / Asset No':veh?(veh.reg_no||''):(e.vehicle_name||''),
      'Vehicle Type':veh?veh.type:'',
      'Name / Nickname':veh?(veh.name && veh.name!==veh.reg_no ? veh.name : ''):'',
      'Branch':veh?(veh.branch||''):'',
      'HMR':e.hmr||'',
      'Quantity (L)':+e.quantity||0,
      'Fill Type': e.fill_type==='full'?'Full':(e.fill_type==='not_full'?'Not Full':''),
      'Vehicle Stock (Angul Naap)': e.stock != null && e.stock !== '' ? +e.stock : '',
      'Trip Avg': (function(){ const a = calcAvg(e,'trip'); return a ? a.formatted : ''; })(),
      'Full-to-Full Avg': (function(){ const a = calcAvg(e,'full2full'); return a ? a.formatted : ''; })(),
      'Manual Consumption (auto)': (function(){ const m = calcManualConsumption(e); return (m && m.value !== undefined) ? +m.value.toFixed(3) : ''; })(),
      'GPS Consumption (Admin)': (e.consumption != null && e.consumption !== '' && !isNaN(+e.consumption)) ? (+e.consumption) : '',
      'Δ Manual − GPS': (function(){ const d = calcConsDiff(e); return d ? +d.delta.toFixed(3) : ''; })(),
      'Δ %': (function(){ const d = calcConsDiff(e); return d ? +d.pct.toFixed(2) : ''; })(),
      'Source':e.source==='other'?(e.source_custom||'Other'):(e.source==='bowser_t1'?'Bowser T1':(e.source==='bowser_t2'?'Bowser T2':e.source||'')),
      'Edit Count':e.edit_count||0,
      'Last Edited':e.edited_at?fmtDT(e.edited_at):'',
    };
    state.customFields.forEach(f=>{
      row[f.field_label] = (e.custom_data||{})[f.field_key] || '';
    });
    return row;
  });
 
  // Edit history sheet
  const editRows = [];
  list.forEach(e=>{
    (e.edit_history||[]).forEach(h=>{
      Object.entries(h.diff||{}).forEach(([field,d])=>{
        const v = state.vehicles.find(x=>x.id===e.vehicle_id);
        editRows.push({
          'When':fmtDT(h.at), 'By':h.by, 'Entry ID':e.id,
          'Vehicle':(v?(v.reg_no||v.name):e.vehicle_name)||'',
          'Field':field, 'Old Value':JSON.stringify(d.old), 'New Value':JSON.stringify(d.new),
        });
      });
    });
  });
 
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows), 'Entries');
  if(editRows.length) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(editRows), 'Edit History');
  XLSX.writeFile(wb, `TASR_Fuel_${from}_to_${to}.xlsx`);
  toast('Excel downloaded','ok');
};

// Reusable searchable vehicle picker — `vehiclesOrGetter` may be an array OR a
// function returning a fresh array (so the dropdown stays current even when the
// form itself is not re-rendered).
function wireVehicleSearch(inputId, hiddenId, resultsId, vehiclesOrGetter, preselectId){
  const inp = document.getElementById(inputId);
  const hid = document.getElementById(hiddenId);
  const res = document.getElementById(resultsId);
  if(!inp || !hid || !res) return;
  const getList = () => typeof vehiclesOrGetter === 'function' ? vehiclesOrGetter() : vehiclesOrGetter;
 
  function render(q){
    const vehicles = getList();
    const query = (q||'').toLowerCase().trim();
    let list = vehicles;
    if(query){
      list = vehicles.filter(v => {
        const hay = ((v.name||'')+' '+(v.reg_no||'')+' '+(v.branch||'')+' '+(v.type||'')).toLowerCase();
        return hay.includes(query);
      });
    }
    if(list.length===0){
      res.innerHTML = `<div class="sd-empty">${vehicles.length===0?'No vehicles available':'No matches — try another keyword'}</div>`;
    } else {
      res.innerHTML = list.slice(0,30).map(v=>`
        <div class="sd-item" data-id="${escapeHtml(v.id)}">
          <div class="sd-name">${escapeHtml(v.reg_no || v.name || '—')}</div>
          <div class="sd-meta">
            <span class="sd-pill">${escapeHtml(v.type||'vehicle')}</span>
            ${v.name && v.name!==v.reg_no ? '<span class="sd-pill">'+escapeHtml(v.name)+'</span>' : ''}
            ${v.branch?'<span class="sd-pill">'+escapeHtml(v.branch)+'</span>':''}
          </div>
        </div>
      `).join('');
    }
    res.classList.add('show');
  }
 
  function selectVehicle(v){
    inp.value = (v.reg_no || v.name) + (v.name && v.name!==v.reg_no ? ' — '+v.name : '');
    hid.value = v.id;
    inp.classList.add('sd-selected');
    res.classList.remove('show');
  }
 
  if(preselectId){
    const v = getList().find(x=>x.id===preselectId);
    if(v) selectVehicle(v);
  }
 
  inp.addEventListener('focus', ()=>render(''));
  inp.addEventListener('input', ()=>{
    hid.value = '';
    inp.classList.remove('sd-selected');
    render(inp.value);
  });
  inp.addEventListener('blur', ()=>{
    // delay to allow click on result
    setTimeout(()=>res.classList.remove('show'), 200);
  });
  res.addEventListener('mousedown', e=>{
    // mousedown fires before blur — prevents the input losing focus from killing the click
    const item = e.target.closest('.sd-item');
    if(!item) return;
    e.preventDefault();
    const v = getList().find(x=>x.id===item.dataset.id);
    if(v) selectVehicle(v);
  });
  res.addEventListener('touchstart', e=>{
    const item = e.target.closest('.sd-item');
    if(!item) return;
    const v = getList().find(x=>x.id===item.dataset.id);
    if(v) selectVehicle(v);
  });
}
 
window.saveNewEntry = function(){

  const hmr = parseFloat($('#ne-hmr').value);

  if(isNaN(qty) || qty<=0){ toast('Quantity required','err'); return; }
  const time = $('#ne-time').value;
  if(!time){ toast('Time required','err'); return; }
  const srcEl = document.querySelector('.source-pill.active');

  const srcCustom = src==='other' ? $('#ne-src-custom').value.trim() : '';

  // Bowser stock validation
  if(src === 'bowser_t1' || src === 'bowser_t2'){

  addEntry({

    vehicle_id: veh.id, vehicle_name: veh.reg_no || veh.name,
    hmr, quantity:qty, fill_time:new Date(time).toISOString(),

window.saveEditEntry = function(id){
  const e = state.entries.find(x=>x.id===id); if(!e) return;
  const vehId = $('#ee-vehicle-id').value;
  const veh = state.vehicles.find(v=>v.id===vehId);
  if(!veh){ toast('Tap to select a vehicle from the list','err'); return; }
  const src = $('#ee-src').value;
  const srcCustom = src==='other' ? $('#ee-src-custom').value.trim() : '';
  const newQty = parseFloat($('#ee-qty').value) || 0;
 
  // Bowser stock validation — account for this entry's existing contribution
  if(src === 'bowser_t1' || src === 'bowser_t2'){
    const tank = src.replace('bowser_','');
    let avail = getBowserStock(tank);
    // If old entry was using same tank, that quantity will be "returned" first
    if(e.source === src) avail += (+e.quantity || 0);
    if(newQty > avail){
      toast('Insufficient fuel in '+tank.toUpperCase()+' — only '+avail.toFixed(1)+' L available (incl. this entry)','err');
      return;
    }
  }
 
  const custom_data = {...(e.custom_data||{})};
  state.customFields.forEach(f=>{
    const el = $('#ee-cf-'+f.id);
    if(el){ const v = el.value.trim(); if(v) custom_data[f.field_key]=v; else delete custom_data[f.field_key]; }
  });
 
  // Consumption (owner only — field present in edit modal for owner)
  const patch = {
    vehicle_id:veh.id, vehicle_name: veh.reg_no || veh.name,
    hmr:parseFloat($('#ee-hmr').value)||null,
    quantity:parseFloat($('#ee-qty').value)||null,
    fill_time:new Date($('#ee-time').value).toISOString(),
    source:src, source_custom:srcCustom,
    fill_type: (document.querySelector('#ee-fill-pills .source-pill.active')||{}).dataset?.fill || 'full',
    stock: parseFloat($('#ee-stock').value) || null,
    custom_data,
  };
  const consEl = $('#ee-consumption');
  if(consEl){
    const cv = consEl.value.trim();
    patch.consumption = cv === '' ? null : (parseFloat(cv) || null);
  }
  updateEntry(id, patch);

    <div class="form-row">
      <label>GPS Consumption value <span style="color:var(--text-soft);font-weight:400">(${unit})</span></label>
      <input type="number" step="0.01" id="cons-val" value="${escapeHtml(currentVal)}" placeholder="e.g. ${isMachine?'4.5':'8.2'}" inputmode="decimal" autofocus>
      <div class="hint">Reading from GPS / telematics system. Visible to all managers. Leave blank and save to clear.</div>
    </div>
    <div style="display:flex;gap:8px">
      ${currentVal ? `<button class="btn ghost" style="flex:1" onclick="saveConsumption('${id}', true)">Clear</button>` : ''}
      <button class="btn" style="flex:2" onclick="saveConsumption('${id}', false)">Save</button>
    </div>
  `);
  setTimeout(()=>{
    const el = document.getElementById('cons-val');
    if(el){ el.focus(); el.select(); el.addEventListener('keydown', ev => { if(ev.key === 'Enter') saveConsumption(id, false); }); }
  }, 80);
};
 
window.saveConsumption = function(id, clear){
  const e = state.entries.find(x=>x.id===id); if(!e) return;
  let val = null;
  if(!clear){
    const raw = ($('#cons-val').value || '').trim();
    if(raw !== ''){
      val = parseFloat(raw);
      if(isNaN(val)){ toast('Enter a valid number','err'); return; }
    }
  }
  updateEntry(id, { consumption: val });
  closeModal();
  renderDash();
  toast(val === null ? 'GPS Consumption cleared' : 'GPS Consumption saved','ok');
};
 
// ============================================================
// BOOT
// ============================================================
loadPersisted();
ensureManagerSlots();
migrateIdsToUuid();
calcRender();
bootScreen();
updateSyncPill();
 
// Initial pull from server, then periodic sync
(async ()=>{
  if(sb){
    await pullAll();
    bootScreen();              // re-evaluate calc/login after settings load
    applyAdminState();         // honour admin kill-switch from server
    if(state.user) renderDash({auto:true});
  }
})();
setInterval(()=>{ if(state.online) trySync(); }, 15000);
setInterval(()=>{ if(state.online && state.user) pullAll().then(()=>{ applyAdminState(); if(state.user) renderDash({auto:true}); }); }, 30000);
</script>
</body>
